name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 */4 * * *' # تشغيل كل 4 ساعات
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    
    # إعطاء صلاحيات الكتابة للمستودع لحفظ ملف الروابط المنشورة
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          # إضافة cloudinary للقائمة وتثبيت البقية
          npm install cloudinary sharp axios rss-parser jsdom @mozilla/readability cheerio googleapis groq-sdk puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Execution
        run: node index.js
        env:
          # إذا كنت تريد وضع مفاتيح API في Secrets (أفضل للأمان)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add published_urls.json
          # سيقوم بالأمر فقط إذا كان هناك تغييرات ليتجنب الخطأ
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update published articles list" && git push)
