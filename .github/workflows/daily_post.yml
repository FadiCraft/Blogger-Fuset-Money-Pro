name: AI Publisher

on:
  schedule:
    - cron: '0 */4 * * *'   # كل 6 ساعات – عدلها كما تشاء
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install groq-sdk googleapis axios sharp

      - name: Run publisher
        run: node index.js
