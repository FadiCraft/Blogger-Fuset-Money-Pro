name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 * * * *' # تم التصحيح: سيعمل الآن كل ساعة بالضبط لتواكب التريند
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Chrome Dependencies (For Puppeteer)
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3 libxss1 libasound2 libatk-bridge2.0-0 libgtk-3-0

      - name: Install Dependencies
        run: |
          npm install --force
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth cloudinary

      - name: Execution
        run: node index.js
