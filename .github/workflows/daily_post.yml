name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 */5 * * *' # يعمل كل 5 ساعات (إذا أردته كل ساعة استخدم '0 * * * *')
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth
          npm install cloudinary sharp axios

      - name: Execution
        run: node index.js
