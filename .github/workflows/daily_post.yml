name: Blogger Bot Automation

on:
  schedule:
    - cron: '0 */2 * * *'  # يعمل كل ساعتين
  workflow_dispatch:        # زر للتشغيل اليدوي من تبويب Actions

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ضروري جداً للسماح للبوت بحفظ التاريخ في مستودعك
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'  # التحديث لنسخة 22 يحل مشكلة ReferenceError: File is not defined

      - name: Install Dependencies
        run: npm install rss-parser jsdom @mozilla/readability cheerio googleapis axios

      - name: Execute Bot Script
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: node index.js

      - name: Save Publishing History
        run: |
          git config --global user.name "Blogger-Bot"
          git config --global user.email "bot@action.com"
          git add history.json || exit 0
          git commit -m "Update history.json [skip ci]" || exit 0
          git push
