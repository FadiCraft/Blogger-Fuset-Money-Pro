name: KiroZozo Auto Blogger (Groq Edition)

on:
  schedule:
    # سيتم التشغيل يومياً الساعة 10 صباحاً بتوقيت مكة/تركيا (07:00 UTC)
    - cron: '0 7 * * *'
  workflow_dispatch: # يتيح لك زر التشغيل اليدوي للتجربة الآن

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # نسخة مستقرة وحديثة لعام 2026

      - name: 📦 Install Required Libraries
        # قمنا بإضافة groq-sdk بدلاً من مكتبة جوجل القديمة
        run: |
          npm init -y
          npm install groq-sdk googleapis

      - name: 🚀 Run Automation Script
        # تشغيل ملف index.js الذي يحتوي على مفتاح Groq
        run: node index.js
