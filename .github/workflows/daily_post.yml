name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 */5 * * *' # ينشر خبر كل 1 ساعات لتواكب التريند
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install --force
          npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Execution
        run: node index.js
