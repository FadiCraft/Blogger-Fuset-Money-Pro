name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 */4 * * *' # غيرتها لـ 4 ساعات بناءً على طلبك الأخير
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          # تثبيت كل المكتبات الضرورية للـ SEO Empire Bot
          npm install --force
          npm install sharp axios rss-parser jsdom @mozilla/readability cheerio googleapis groq-sdk puppeteer puppeteer-extra puppeteer-extra-plugin-stealth

      - name: Execution
        run: node index.js
