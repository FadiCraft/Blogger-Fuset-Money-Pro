name: Google News Blogger Bot

on:
  schedule:
    - cron: '0 */2 * * *'  # يعمل كل ساعتين
  workflow_dispatch:        # إمكانية التشغيل اليدوي

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # ضروري للسماح للبوت بتحديث ملف التاريخ
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install rss-parser jsdom @mozilla/readability cheerio googleapis axios

      - name: Execution
        env:
          BLOG_ID: ${{ secrets.BLOG_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
        run: node index.js

      - name: Save History
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add history.json
          git commit -m "Update history [skip ci]" || echo "No changes to commit"
          git push
